<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Mood Mirror &amp; Press Review</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/17.0.2/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/17.0.2/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/6.26.0/babel.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.2.0/Recharts.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        :root {
            --primary-color: #6610f2;
            --accent-color: #00b8d9;
            --secondary-color: #6c757d;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --warning-color: #ffc107;
            --info-color: #17a2b8;
            --light-color: #f8f9fa;
            --dark-color: #1d2330;
            --card-shadow: 0 4px 14px rgba(0,0,0,0.10);
            --transition-speed: 0.3s;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6; background-color: #eef1f6; color: #2a2f3a;
        }
        .App { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header {
            text-align: center; margin-bottom: 20px; padding: 24px;
            background: linear-gradient(135deg, var(--primary-color), #3a0ca3);
            color: white; border-radius: 12px; box-shadow: var(--card-shadow);
        }
        .header h1 { margin-bottom: 6px; font-size: 2.2rem; }
        .header p { font-size: 1.05rem; opacity: 0.92; }
        .toolbar { display:flex; justify-content:center; align-items:center;
            gap:16px; margin-top:16px; flex-wrap:wrap; }
        .pill { background: rgba(255,255,255,0.16); padding: 5px 12px;
            border-radius: 20px; font-size: 0.85rem; }
        .stat-card {
            background: white; padding: 22px; border-radius: 12px;
            box-shadow: var(--card-shadow); transition: transform var(--transition-speed);
        }
        .stat-card:hover { transform: translateY(-3px); }
        .stat-card h3 { color: var(--secondary-color); margin-bottom: 14px;
            border-bottom: 1px solid #eee; padding-bottom: 8px; font-size: 1rem; }
        .stats-grid { display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 18px; margin: 18px 0; }
        .chart-container { background: white; padding: 22px; border-radius: 12px;
            margin: 18px 0; box-shadow: var(--card-shadow); overflow: hidden; }
        .chart-container h2 { margin-bottom: 16px; color: var(--dark-color);
            border-bottom: 1px solid #eee; padding-bottom: 10px; font-size: 1.2rem; }
        .match-header { margin-bottom: 18px; background: white; padding: 20px;
            border-radius: 12px; box-shadow: var(--card-shadow);
            display:flex; justify-content:space-between; align-items:center; }
        .match-teams { display:flex; align-items:center; gap: 18px; }
        .team-logo { width: 54px; height: 54px; border-radius: 50%;
            display:flex; align-items:center; justify-content:center;
            font-weight:bold; font-size:1.1rem; color:white; }
        .logo-home { background:#860038; }
        .logo-away { background:#006bb6; }
        .team-block { text-align:center; }
        .team-score { font-size:1.8rem; font-weight:bold; }
        .vs { font-size:1.1rem; color: var(--secondary-color); }
        .match-info { text-align:right; }
        .match-date { font-weight:bold; color: var(--primary-color); }
        .tabs { display:flex; margin-bottom: 18px; border-radius: 8px;
            overflow:hidden; box-shadow: var(--card-shadow); }
        .tab { padding: 14px 18px; cursor:pointer; background:#fff; border:none;
            flex:1; text-align:center; transition: all var(--transition-speed);
            font-weight:600; color: var(--secondary-color); font-size:0.95rem; }
        .tab:hover { background:#f0ecff; }
        .tab.active { background: var(--primary-color); color:white; }
        .tab .badge-dot { display:inline-block; width:8px; height:8px;
            background: var(--danger-color); border-radius:50%; margin-left:6px;
            animation: pulse 1.2s infinite; }
        @keyframes pulse { 0%{opacity:1;} 50%{opacity:0.3;} 100%{opacity:1;} }
        .tab-content { display:none; }
        .tab-content.active { display:block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
        /* Meters */
        .meter { margin: 14px 0; }
        .meter-label { display:flex; justify-content:space-between;
            font-weight:600; margin-bottom:5px; }
        .meter-track { height:14px; border-radius:7px; background:#e9ecef;
            overflow:hidden; }
        .meter-fill { height:100%; border-radius:7px; transition: width 0.6s; }
        .big-number { font-size:2.4rem; font-weight:bold; }
        .prob-bar { display:flex; height:40px; border-radius:8px; overflow:hidden;
            margin:12px 0; font-weight:bold; color:white; }
        .prob-home { background:#860038; display:flex; align-items:center;
            justify-content:flex-start; padding-left:12px; }
        .prob-away { background:#006bb6; display:flex; align-items:center;
            justify-content:flex-end; padding-right:12px; }
        /* Articles */
        .article { background:white; border-radius:10px; padding:14px 16px;
            margin-bottom:10px; box-shadow: var(--card-shadow);
            border-left:5px solid var(--secondary-color); }
        .article a { color: var(--dark-color); text-decoration:none;
            font-weight:600; }
        .article a:hover { color: var(--primary-color); }
        .article-meta { font-size:0.82rem; color: var(--secondary-color);
            margin-top:6px; display:flex; gap:12px; flex-wrap:wrap; }
        .sent-badge { padding:2px 9px; border-radius:12px; font-size:0.75rem;
            font-weight:bold; color:white; }
        .badge { display:inline-block; padding:3px 9px; border-radius:12px;
            font-size:0.78rem; font-weight:bold; margin-right:5px;
            background: var(--light-color); color: var(--dark-color); }
        /* Alerts */
        .alert-banner { padding:14px 18px; border-radius:10px; margin-bottom:10px;
            color:white; font-weight:600; display:flex; align-items:center; gap:10px; }
        .alert-high { background: var(--danger-color); }
        .alert-medium { background: var(--warning-color); color:#3a2f00; }
        .filters { margin-bottom:16px; display:flex; gap:12px; flex-wrap:wrap; }
        .filter-select, .search-bar { padding:10px 14px; border-radius:6px;
            border:1px solid #ddd; background:#fff; font-size:0.95rem;
            color: var(--dark-color); }
        .search-bar { flex:1; min-width:200px; }
        .switch { position:relative; display:inline-block; width:52px; height:28px; }
        .switch input { opacity:0; width:0; height:0; }
        .slider { position:absolute; cursor:pointer; inset:0; background:#ccc;
            transition:.4s; border-radius:28px; }
        .slider:before { position:absolute; content:""; height:20px; width:20px;
            left:4px; bottom:4px; background:white; transition:.4s; border-radius:50%; }
        input:checked + .slider { background: var(--accent-color); }
        input:checked + .slider:before { transform: translateX(24px); }
        .loading-container { display:flex; justify-content:center;
            align-items:center; min-height:240px; flex-direction:column; gap:14px; }
        .loading-spinner { border:4px solid rgba(0,0,0,0.1); border-radius:50%;
            border-top:4px solid var(--primary-color); width:46px; height:46px;
            animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .error-box { background:#fff3f3; border:1px solid var(--danger-color);
            color:#a4282f; padding:20px; border-radius:10px; }
        .error-box code { background:#2a2f3a; color:#fff; padding:2px 6px;
            border-radius:4px; }
        .source-chip { display:inline-block; padding:4px 10px; border-radius:14px;
            font-size:0.78rem; font-weight:600; margin:3px; }
        .src-ok { background:#d4f7dd; color:#176b2c; }
        .src-partial { background:#fff4d6; color:#7a5b00; }
        .src-error { background:#fde0e0; color:#a4282f; }
        .section-title { margin: 24px 0 12px; color: var(--dark-color);
            border-left:4px solid var(--primary-color); padding-left:10px; }
        .live-score { font-size:3rem; font-weight:bold; }
        /* Dark mode */
        .dark-mode { background:#10131a; color:#e6e8ee; }
        .dark-mode .stat-card, .dark-mode .chart-container,
        .dark-mode .match-header, .dark-mode .article { background:#1d2330; color:#e6e8ee; }
        .dark-mode .tab { background:#1d2330; color:#aab; }
        .dark-mode .tab:hover { background:#2a3142; }
        .dark-mode .tab.active { background: var(--primary-color); color:#fff; }
        .dark-mode .filter-select, .dark-mode .search-bar { background:#2a3142;
            color:#e6e8ee; border-color:#3a4254; }
        .dark-mode h2, .dark-mode h3, .dark-mode .section-title { color:#e6e8ee; }
        .dark-mode .article a { color:#e6e8ee; }
        .dark-mode .meter-track { background:#2a3142; }
        @media (max-width: 768px) {
            .tabs { flex-direction: column; }
            .match-header { flex-direction: column; gap: 12px; text-align:center; }
            .match-info { text-align:center; }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
const { LineChart, Line, BarChart, Bar, CartesianGrid, XAxis, YAxis, Tooltip,
        Legend, ResponsiveContainer, PieChart, Pie, Cell } = Recharts;

const SNAPSHOT_REFRESH_MS = 60000;
const LIVE_REFRESH_MS = 20000;

// ---- helpers --------------------------------------------------------------
function sentimentColor(c) {
    if (c >= 0.35) return '#28a745';
    if (c <= -0.35) return '#dc3545';
    return '#ffc107';
}
function sentimentLabel(c) {
    if (c >= 0.35) return 'positive';
    if (c <= -0.35) return 'negative';
    return 'neutral';
}
function meterColor(kind, v) {
    if (kind === 'toxicity') return v > 50 ? '#dc3545' : v > 25 ? '#ffc107' : '#28a745';
    if (kind === 'hype') return '#00b8d9';
    return '#6610f2';
}
function fmtPct(p) { return (p * 100).toFixed(1) + '%'; }
function fmtDate(s) {
    if (!s) return '';
    const d = new Date(s);
    return isNaN(d) ? s : d.toLocaleString('en-US',
        { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function Meter({ label, value, kind }) {
    const v = Math.max(0, Math.min(100, value || 0));
    return (
        <div className="meter">
            <div className="meter-label">
                <span>{label}</span><span>{v.toFixed(0)}/100</span>
            </div>
            <div className="meter-track">
                <div className="meter-fill"
                    style={{ width: v + '%', background: meterColor(kind, v) }}></div>
            </div>
        </div>
    );
}

function SourceChips({ sources }) {
    if (!sources) return null;
    return (
        <div style={{ marginTop: '8px' }}>
            {sources.map(s => (
                <span key={s.name} className={'source-chip src-' + s.status}
                    title={s.error || ''}>
                    {s.name}: {s.status} ({s.count})
                </span>
            ))}
        </div>
    );
}

// ---- Mood Mirror tab ------------------------------------------------------
function MoodTab({ snap }) {
    const mood = snap.mood || {};
    const overall = mood.overall || {};
    const ts = mood.team_sentiment || {};
    const home = snap.teams.home, away = snap.teams.away;
    const teamData = [
        { name: home.abbr, sentiment: (ts.home || 0) },
        { name: away.abbr, sentiment: (ts.away || 0) },
    ];
    const timeline = (mood.timeline || []).map(t => ({
        date: t.date.slice(5), sentiment: t.mean_sentiment, volume: t.volume }));
    return (
        <div>
            <div className="stats-grid">
                <div className="stat-card">
                    <h3><i className="fas fa-fire"></i> Mood Meters (overall)</h3>
                    <Meter label="Heat Index" value={overall.heat} kind="heat" />
                    <Meter label="Hype Meter" value={overall.hype} kind="hype" />
                    <Meter label="Toxicity Meter" value={overall.toxicity} kind="toxicity" />
                    <p style={{ marginTop: '10px', fontSize: '0.88rem', color: '#888' }}>
                        Based on {overall.volume || 0} matchup-relevant items ·
                        mean sentiment {(overall.mean_sentiment || 0).toFixed(2)}
                    </p>
                </div>
                <div className="stat-card">
                    <h3><i className="fas fa-balance-scale"></i> Team Sentiment</h3>
                    <div style={{ textAlign: 'center', margin: '10px 0' }}>
                        <span className="big-number"
                            style={{ color: sentimentColor(ts.home || 0) }}>
                            {(ts.home || 0).toFixed(2)}</span>
                        <div>{home.name} ({ts.count_home || 0} items)</div>
                    </div>
                    <div style={{ textAlign: 'center' }}>
                        <span className="big-number"
                            style={{ color: sentimentColor(ts.away || 0) }}>
                            {(ts.away || 0).toFixed(2)}</span>
                        <div>{away.name} ({ts.count_away || 0} items)</div>
                    </div>
                </div>
            </div>
            <div className="chart-container">
                <h2>Sentiment by Team</h2>
                <ResponsiveContainer width="100%" height={260}>
                    <BarChart data={teamData}>
                        <CartesianGrid strokeDasharray="3 3" />
                        <XAxis dataKey="name" /><YAxis domain={[-1, 1]} />
                        <Tooltip /> <Bar dataKey="sentiment">
                            {teamData.map((e, i) => (
                                <Cell key={i} fill={sentimentColor(e.sentiment)} />))}
                        </Bar>
                    </BarChart>
                </ResponsiveContainer>
            </div>
            {timeline.length > 1 && (
                <div className="chart-container">
                    <h2>Sentiment Timeline (press coverage)</h2>
                    <ResponsiveContainer width="100%" height={280}>
                        <LineChart data={timeline}>
                            <CartesianGrid strokeDasharray="3 3" />
                            <XAxis dataKey="date" /><YAxis domain={[-1, 1]} />
                            <Tooltip /> <Legend />
                            <Line type="monotone" dataKey="sentiment" name="Mean sentiment"
                                stroke="#6610f2" strokeWidth={2} />
                        </LineChart>
                    </ResponsiveContainer>
                </div>
            )}
            <NarrativeChips narratives={snap.narratives} />
            <div className="stats-grid">
                <EmotionsCard emotions={mood.emotions} />
                <PlayersCard players={snap.players} teams={snap.teams} />
            </div>
        </div>
    );
}

// ---- Emotion breakdown ----------------------------------------------------
function EmotionsCard({ emotions }) {
    if (!emotions) return null;
    const colors = { joy: '#28a745', anger: '#dc3545', fear: '#fd7e14',
        sadness: '#6c757d', anticipation: '#00b8d9' };
    const data = Object.keys(emotions).map(k => ({
        emotion: k, value: +(emotions[k] * 100).toFixed(1) }));
    return (
        <div className="stat-card">
            <h3><i className="fas fa-theater-masks"></i> Emotion breakdown</h3>
            <ResponsiveContainer width="100%" height={220}>
                <BarChart data={data} layout="vertical"
                    margin={{ left: 20 }}>
                    <CartesianGrid strokeDasharray="3 3" />
                    <XAxis type="number" domain={[0, 100]} />
                    <YAxis type="category" dataKey="emotion" width={90} />
                    <Tooltip formatter={v => v + '%'} />
                    <Bar dataKey="value">
                        {data.map((e, i) => <Cell key={i} fill={colors[e.emotion]} />)}
                    </Bar>
                </BarChart>
            </ResponsiveContainer>
        </div>
    );
}

// ---- Player sentiment -----------------------------------------------------
function PlayersCard({ players, teams }) {
    if (!players || players.length === 0) return null;
    const teamName = t => t === 'home' ? teams.home.abbr : teams.away.abbr;
    return (
        <div className="stat-card">
            <h3><i className="fas fa-users"></i> Player buzz &amp; sentiment</h3>
            <table style={{ boxShadow: 'none', marginTop: '4px' }}>
                <thead><tr>
                    <th>Player</th><th>Team</th><th>Mentions</th><th>Sentiment</th>
                </tr></thead>
                <tbody>
                    {players.slice(0, 8).map(p => (
                        <tr key={p.name}>
                            <td>{p.name}</td>
                            <td>{teamName(p.team)}</td>
                            <td>{p.mentions}</td>
                            <td><span className="sent-badge"
                                style={{ background: sentimentColor(p.mean_sentiment) }}>
                                {p.mean_sentiment.toFixed(2)}</span></td>
                        </tr>
                    ))}
                </tbody>
            </table>
        </div>
    );
}

// ---- Narrative tracker ----------------------------------------------------
function NarrativeChips({ narratives }) {
    if (!narratives || narratives.length === 0) return null;
    return (
        <div className="chart-container">
            <h2><i className="fas fa-hashtag"></i> Trending narratives</h2>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px' }}>
                {narratives.map(n => (
                    <span key={n.term} className="badge"
                        style={{ background: sentimentColor(n.mean_sentiment),
                            color: 'white', fontSize: '0.9rem', padding: '6px 12px' }}>
                        {n.term} · {n.count}
                    </span>
                ))}
            </div>
        </div>
    );
}

// ---- Press Review tab -----------------------------------------------------
function PressTab({ snap }) {
    const [query, setQuery] = React.useState('');
    const [sentFilter, setSentFilter] = React.useState('all');
    const articles = (snap.press_review || []).filter(a => {
        if (sentFilter !== 'all' && a.sentiment_label !== sentFilter) return false;
        if (query && !(a.title || '').toLowerCase().includes(query.toLowerCase())
            && !(a.outlet || '').toLowerCase().includes(query.toLowerCase()))
            return false;
        return true;
    });
    return (
        <div>
            <div className="filters">
                <input className="search-bar" placeholder="Search headlines / outlets..."
                    value={query} onChange={e => setQuery(e.target.value)} />
                <select className="filter-select" value={sentFilter}
                    onChange={e => setSentFilter(e.target.value)}>
                    <option value="all">All sentiment</option>
                    <option value="positive">Positive</option>
                    <option value="neutral">Neutral</option>
                    <option value="negative">Negative</option>
                </select>
            </div>
            <p style={{ color: '#888', marginBottom: '10px' }}>
                {articles.length} articles · imported directly when enrichment status
                was "ok" (no second filtering pass)
            </p>
            {articles.map(a => (
                <div className="article" key={a.id}
                    style={{ borderLeftColor: sentimentColor(a.sentiment.compound) }}>
                    <a href={a.url} target="_blank" rel="noopener">{a.title}</a>
                    <div className="article-meta">
                        <span className="sent-badge"
                            style={{ background: sentimentColor(a.sentiment.compound) }}>
                            {sentimentLabel(a.sentiment.compound)} ({a.sentiment.compound.toFixed(2)})
                        </span>
                        <span><i className="fas fa-newspaper"></i> {a.outlet || a.source}</span>
                        <span><i className="far fa-clock"></i> {fmtDate(a.published)}</span>
                        {a.team && a.team !== 'general' &&
                            <span className="badge">{a.team}</span>}
                    </div>
                </div>
            ))}
            {articles.length === 0 &&
                <p style={{ textAlign: 'center', padding: '20px' }}>No articles match.</p>}
        </div>
    );
}

// ---- Prediction tab -------------------------------------------------------
function PredictionTab({ snap }) {
    const p = snap.prediction || {};
    const home = snap.teams.home, away = snap.teams.away;
    const ens = p.ensemble || { home: 0.5, away: 0.5, components: {} };
    const market = p.market, elo = p.elo || {};
    const compareData = [
        { model: 'Market (de-vig)', home: market ? market.home : null },
        { model: 'Elo / log5', home: elo.home },
        { model: 'Ensemble', home: ens.home },
    ].filter(d => d.home != null).map(d => ({
        model: d.model, [home.abbr]: +(d.home * 100).toFixed(1),
        [away.abbr]: +((1 - d.home) * 100).toFixed(1) }));
    const series = p.series || {};
    const perGame = (series.per_game || []).map(g => ({
        game: 'G' + g.game + ' @' + g.venue,
        'Knicks win %': +(g.leader_win * 100).toFixed(1) }));
    return (
        <div>
            <div className="chart-container">
                <h2>Ensemble Win Probability</h2>
                <div className="prob-bar">
                    <div className="prob-home" style={{ width: fmtPct(ens.home) }}>
                        {home.abbr} {fmtPct(ens.home)}</div>
                    <div className="prob-away" style={{ width: fmtPct(ens.away) }}>
                        {fmtPct(ens.away)} {away.abbr}</div>
                </div>
                <p style={{ color: '#888' }}>
                    Confidence {p.confidence}/100 · blend of market ({W(ens, 'market')}),
                    Elo ({W(ens, 'elo')}) and a bounded sentiment nudge
                    ({(ens.components.sentiment_delta * 100 || 0).toFixed(1)} pts)
                </p>
            </div>
            <div className="stats-grid">
                <div className="stat-card">
                    <h3>Market (odds, de-vigged)</h3>
                    {market ? (
                        <div>
                            <p><strong>{home.abbr}:</strong> {fmtPct(market.home)}</p>
                            <p><strong>{away.abbr}:</strong> {fmtPct(market.away)}</p>
                            <p style={{ color: '#888', fontSize: '0.85rem' }}>
                                method: {market.method}
                                {market.margin_pct != null &&
                                    ' · vig ' + market.margin_pct + '%'}</p>
                            {snap.game && snap.game.odds &&
                                <p style={{ fontSize: '0.85rem' }}>
                                    line: {snap.game.odds.details} · O/U {snap.game.odds.over_under}</p>}
                        </div>
                    ) : <p>No odds available.</p>}
                </div>
                <div className="stat-card">
                    <h3>Elo / log5</h3>
                    <p><strong>{home.abbr}:</strong> {fmtPct(elo.home)}</p>
                    <p><strong>{away.abbr}:</strong> {fmtPct(elo.away)}</p>
                    {elo.ratings &&
                        <p style={{ color: '#888', fontSize: '0.85rem' }}>
                            ratings — {home.abbr} {elo.ratings.home} ·
                            {away.abbr} {elo.ratings.away}</p>}
                </div>
                <div className="stat-card">
                    <h3>Series ({series.lead})</h3>
                    <div style={{ textAlign: 'center' }}>
                        <span className="big-number" style={{ color: '#006bb6' }}>
                            {fmtPct(series.leader_clinch_probability || 0)}</span>
                        <div>{series.leader} win the series</div>
                    </div>
                </div>
                <ValueBetCard vb={p.value_bet} teams={snap.teams} />
            </div>
            <div className="chart-container">
                <h2>Model Comparison (win %)</h2>
                <ResponsiveContainer width="100%" height={280}>
                    <BarChart data={compareData}>
                        <CartesianGrid strokeDasharray="3 3" />
                        <XAxis dataKey="model" /><YAxis domain={[0, 100]} />
                        <Tooltip /> <Legend />
                        <Bar dataKey={home.abbr} fill="#860038" />
                        <Bar dataKey={away.abbr} fill="#006bb6" />
                    </BarChart>
                </ResponsiveContainer>
            </div>
            {perGame.length > 0 && (
                <div className="chart-container">
                    <h2>Remaining-game win probability ({series.leader})</h2>
                    <ResponsiveContainer width="100%" height={260}>
                        <BarChart data={perGame}>
                            <CartesianGrid strokeDasharray="3 3" />
                            <XAxis dataKey="game" /><YAxis domain={[0, 100]} />
                            <Tooltip /> <Bar dataKey="Knicks win %" fill="#006bb6" />
                        </BarChart>
                    </ResponsiveContainer>
                </div>
            )}
            <HistoryChart history={snap.history} teams={snap.teams} />
        </div>
    );
}
function W(ens, key) {
    const v = ens.components && ens.components[key];
    return v != null ? (v * 100).toFixed(0) + '%' : 'n/a';
}

// ---- Value bet card -------------------------------------------------------
function ValueBetCard({ vb, teams }) {
    if (!vb) return <div className="stat-card"><h3>Value vs. market</h3>
        <p>No odds available.</p></div>;
    const sideName = vb.side === 'home' ? teams.home.abbr : teams.away.abbr;
    const color = vb.has_value ? '#28a745' : '#6c757d';
    return (
        <div className="stat-card">
            <h3><i className="fas fa-coins"></i> Value vs. market</h3>
            <div style={{ textAlign: 'center' }}>
                <span className="big-number" style={{ color }}>
                    {vb.edge_pct > 0 ? '+' : ''}{vb.edge_pct}%</span>
                <div>model edge on <strong>{sideName}</strong>
                    {vb.moneyline != null && ' (' + (vb.moneyline > 0 ? '+' : '') + vb.moneyline + ')'}</div>
            </div>
            {vb.expected_value != null &&
                <p style={{ color: '#888', fontSize: '0.85rem', marginTop: '8px' }}>
                    expected value: {vb.expected_value > 0 ? '+' : ''}
                    {(vb.expected_value * 100).toFixed(1)}% per unit ·
                    {vb.has_value ? ' value detected' : ' no clear edge'}</p>}
        </div>
    );
}

// ---- History trend (win prob, odds, mood across runs) --------------------
function HistoryChart({ history, teams }) {
    if (!history || history.length < 2) return null;
    const data = history.map((h, i) => ({
        i: i + 1,
        'Ensemble (home)': h.ens_home != null ? +(h.ens_home * 100).toFixed(1) : null,
        'Market (home)': h.market_home != null ? +(h.market_home * 100).toFixed(1) : null,
        'Clinch': h.clinch != null ? +(h.clinch * 100).toFixed(1) : null,
    }));
    return (
        <div className="chart-container">
            <h2><i className="fas fa-chart-line"></i> Movement across runs ({teams.home.abbr} win % &amp; clinch)</h2>
            <ResponsiveContainer width="100%" height={260}>
                <LineChart data={data}>
                    <CartesianGrid strokeDasharray="3 3" />
                    <XAxis dataKey="i" /><YAxis domain={[0, 100]} />
                    <Tooltip /> <Legend />
                    <Line type="monotone" dataKey="Ensemble (home)" stroke="#6610f2" strokeWidth={2} dot={false} />
                    <Line type="monotone" dataKey="Market (home)" stroke="#00b8d9" strokeWidth={2} dot={false} />
                    <Line type="monotone" dataKey="Clinch" stroke="#28a745" strokeWidth={2} dot={false} />
                </LineChart>
            </ResponsiveContainer>
        </div>
    );
}

// ---- Live tab -------------------------------------------------------------
function LiveTab({ live }) {
    if (!live) {
        return <div className="stat-card"><h3>Live mode</h3>
            <p>No live data yet. During the game, run
            <code> python3 -m backend.run live </code> to populate this view.</p></div>;
    }
    const L = live.live || {};
    const g = live.game || {};
    const run = L.current_run || {};
    const scoreTl = (L.score_timeline || []).map((s, i) => ({
        i, [g.home ? g.home.abbr : 'home']: s.home,
        [g.away ? g.away.abbr : 'away']: s.away }));
    return (
        <div>
            {(live.alerts || []).map((a, i) => (
                <div key={i} className={'alert-banner alert-' + a.severity}>
                    <i className="fas fa-bolt"></i> {a.text}
                </div>
            ))}
            <div className="match-header">
                <div className="team-block">
                    <div>{g.home ? g.home.name : 'Home'}</div>
                    <div className="live-score">{g.home ? g.home.score : '-'}</div>
                </div>
                <div style={{ textAlign: 'center' }}>
                    <div className="vs">{g.detail || g.state}</div>
                    <div className="pill" style={{ background: '#6610f2', color: '#fff' }}>
                        {live.mode === 'live' ? 'LIVE' : live.mode}</div>
                </div>
                <div className="team-block">
                    <div>{g.away ? g.away.name : 'Away'}</div>
                    <div className="live-score">{g.away ? g.away.score : '-'}</div>
                </div>
            </div>
            <div className="stats-grid">
                <div className="stat-card">
                    <h3>Current Run</h3>
                    <div style={{ textAlign: 'center' }}>
                        <span className="big-number">{run.points || 0}-0</span>
                        <div>{run.team || '—'}</div>
                    </div>
                </div>
                <div className="stat-card">
                    <h3>Momentum</h3>
                    <Meter label={(L.momentum > 0 ? (g.home && g.home.abbr) : (g.away && g.away.abbr)) + ' favored'}
                        value={Math.abs(L.momentum || 0) * 100} kind="heat" />
                    <p style={{ color: '#888' }}>signed: {(L.momentum || 0).toFixed(2)}</p>
                </div>
                <div className="stat-card">
                    <h3>Sentiment Spike</h3>
                    <div style={{ textAlign: 'center' }}>
                        <span className="big-number"
                            style={{ color: (L.sentiment_spike || 0) < 0 ? '#dc3545' : '#28a745' }}>
                            {(L.sentiment_spike || 0).toFixed(1)}σ</span>
                        <div>{(L.sentiment_spike || 0) <= -1.5 ? 'panic' :
                            (L.sentiment_spike || 0) >= 1.5 ? 'hype surge' : 'stable'}</div>
                    </div>
                </div>
            </div>
            {L.mood && (
                <div className="stat-card" style={{ marginBottom: '18px' }}>
                    <h3>Live Mood</h3>
                    <Meter label="Heat" value={L.mood.heat} kind="heat" />
                    <Meter label="Hype" value={L.mood.hype} kind="hype" />
                    <Meter label="Toxicity" value={L.mood.toxicity} kind="toxicity" />
                </div>
            )}
            {scoreTl.length > 1 && (
                <div className="chart-container">
                    <h2>Score progression</h2>
                    <ResponsiveContainer width="100%" height={260}>
                        <LineChart data={scoreTl}>
                            <CartesianGrid strokeDasharray="3 3" />
                            <XAxis dataKey="i" /><YAxis />
                            <Tooltip /> <Legend />
                            <Line type="monotone" dataKey={g.home ? g.home.abbr : 'home'}
                                stroke="#860038" strokeWidth={2} dot={false} />
                            <Line type="monotone" dataKey={g.away ? g.away.abbr : 'away'}
                                stroke="#006bb6" strokeWidth={2} dot={false} />
                        </LineChart>
                    </ResponsiveContainer>
                </div>
            )}
            {(L.recent_events || []).length > 0 && (
                <div className="stat-card">
                    <h3>Recent plays</h3>
                    {L.recent_events.slice().reverse().map((e, i) => (
                        <p key={i} style={{ fontSize: '0.9rem' }}>
                            <strong>Q{e.period} {e.clock}</strong> · {e.team} · {e.desc}</p>
                    ))}
                </div>
            )}
        </div>
    );
}

// ---- App ------------------------------------------------------------------
function App() {
    const [snap, setSnap] = React.useState(null);
    const [live, setLive] = React.useState(null);
    const [tab, setTab] = React.useState('mood');
    const [dark, setDark] = React.useState(false);
    const [error, setError] = React.useState(null);

    const loadSnapshot = React.useCallback(() => {
        fetch('data/snapshot.json?t=' + Date.now())
            .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
            .then(d => { setSnap(d); setError(null); })
            .catch(e => setError(e.message));
    }, []);
    const loadLive = React.useCallback(() => {
        fetch('data/live.json?t=' + Date.now())
            .then(r => r.ok ? r.json() : null)
            .then(d => setLive(d)).catch(() => {});
    }, []);

    React.useEffect(() => {
        loadSnapshot(); loadLive();
        const s = setInterval(loadSnapshot, SNAPSHOT_REFRESH_MS);
        const l = setInterval(loadLive, LIVE_REFRESH_MS);
        return () => { clearInterval(s); clearInterval(l); };
    }, [loadSnapshot, loadLive]);

    React.useEffect(() => {
        document.body.classList.toggle('dark-mode', dark);
    }, [dark]);

    const isLive = live && live.mode === 'live';
    React.useEffect(() => { if (isLive) setTab('live'); }, [isLive]);

    if (error && !snap) {
        return (
            <div className="App">
                <div className="header"><h1>NBA Mood Mirror</h1></div>
                <div className="error-box">
                    <h3><i className="fas fa-exclamation-triangle"></i> Could not load data</h3>
                    <p>{error}. Generate it and serve over HTTP (not file://):</p>
                    <p><code>python3 -m backend.run snapshot</code></p>
                    <p><code>python3 -m http.server 8000</code> → open
                        <code> http://localhost:8000/</code></p>
                </div>
            </div>
        );
    }
    if (!snap) {
        return <div className="App"><div className="loading-container">
            <div className="loading-spinner"></div><p>Loading mood data…</p></div></div>;
    }

    const home = snap.teams.home, away = snap.teams.away;
    return (
        <div className="App">
            <div className="header">
                <h1>NBA Mood Mirror &amp; Press Review</h1>
                <p>Sentiment, press review and prediction for {away.name} @ {home.name}</p>
                <div className="toolbar">
                    <span className="pill">{snap.label}</span>
                    <span className="pill">Series: {snap.series.leader} {snap.series.lead}</span>
                    <span className="pill">Mode: {snap.mode}{isLive ? ' (LIVE)' : ''}</span>
                    <label className="switch">
                        <input type="checkbox" checked={dark}
                            onChange={() => setDark(!dark)} />
                        <span className="slider"></span>
                    </label>
                </div>
            </div>

            <div className="match-header">
                <div className="match-teams">
                    <div className="team-block">
                        <div className="team-logo logo-home">{home.abbr}</div>
                        <div>{home.name}</div>
                        {snap.game && <div className="team-score">{snap.game.home.score}</div>}
                    </div>
                    <div className="vs">vs</div>
                    <div className="team-block">
                        <div className="team-logo logo-away">{away.abbr}</div>
                        <div>{away.name}</div>
                        {snap.game && <div className="team-score">{snap.game.away.score}</div>}
                    </div>
                </div>
                <div className="match-info">
                    <div className="match-date">{snap.game ? snap.game.detail : ''}</div>
                    <div>{snap.venue}</div>
                    <SourceChips sources={snap.sources} />
                </div>
            </div>

            <div className="tabs">
                {[['mood', 'Mood Mirror'], ['press', 'Press Review'],
                  ['prediction', 'Prediction'], ['live', 'Live']].map(([k, lbl]) => (
                    <button key={k} className={'tab ' + (tab === k ? 'active' : '')}
                        onClick={() => setTab(k)}>
                        {lbl}{k === 'live' && isLive && <span className="badge-dot"></span>}
                    </button>
                ))}
            </div>

            <div className={'tab-content ' + (tab === 'mood' ? 'active' : '')}>
                <MoodTab snap={snap} /></div>
            <div className={'tab-content ' + (tab === 'press' ? 'active' : '')}>
                <PressTab snap={snap} /></div>
            <div className={'tab-content ' + (tab === 'prediction' ? 'active' : '')}>
                <PredictionTab snap={snap} /></div>
            <div className={'tab-content ' + (tab === 'live' ? 'active' : '')}>
                <LiveTab live={live} /></div>

            <p style={{ textAlign: 'center', color: '#999', marginTop: '24px',
                fontSize: '0.82rem' }}>
                Generated {fmtDate(snap.generated_at)} · free/keyless sources only ·
                auto-refresh on
            </p>
        </div>
    );
}
ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
