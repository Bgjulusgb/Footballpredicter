<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fußball Vorhersage App</title>

    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/17.0.2/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/6.26.0/babel.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.2.0/Recharts.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        :root {
            --primary-color: #007bff;
            --secondary-color: #6c757d;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --warning-color: #ffc107;
            --info-color: #17a2b8;
            --light-color: #f8f9fa;
            --dark-color: #343a40;
            --card-shadow: 0 4px 6px rgba(0,0,0,0.1);
            --transition-speed: 0.3s;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            background-color: #f5f7fa;
            color: #333;
        }
        
        .App {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, var(--primary-color), #0056b3);
            color: white;
            border-radius: 10px;
            box-shadow: var(--card-shadow);
        }
        
        .header h1 {
            margin-bottom: 10px;
            font-size: 2.5rem;
        }
        
        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: var(--card-shadow);
            transition: transform var(--transition-speed);
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-card h3 {
            color: var(--secondary-color);
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        
        .chart-container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            margin: 20px 0;
            box-shadow: var(--card-shadow);
            overflow: hidden;
        }
        
        .chart-container h2 {
            margin-bottom: 20px;
            color: var(--dark-color);
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            box-shadow: var(--card-shadow);
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }
        
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        th {
            background-color: var(--light-color);
            font-weight: 600;
            color: var(--secondary-color);
        }
        
        tr:hover {
            background-color: rgba(0,0,0,0.02);
        }
        
        .prediction-table {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
            padding: 20px;
        }
        
        .prediction-table h2 {
            margin-bottom: 15px;
            color: var(--dark-color);
        }
        
        .highlight {
            color: var(--primary-color);
            font-weight: bold;
        }
        
        .highlight-danger {
            color: var(--danger-color);
            font-weight: bold;
        }
        
        .highlight-success {
            color: var(--success-color);
            font-weight: bold;
        }
        
        .highlight-warning {
            color: var(--warning-color);
            font-weight: bold;
        }
        
        .match-header {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: var(--dark-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: var(--card-shadow);
        }
        
        .match-teams {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .team-logo {
            width: 50px;
            height: 50px;
            background-color: #eee;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }
        
        .vs {
            font-size: 1.2rem;
            color: var(--secondary-color);
        }
        
        .match-info {
            text-align: right;
        }
        
        .match-date {
            font-weight: bold;
            color: var(--primary-color);
        }
        
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-radius: 5px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
        }
        
        .tab {
            padding: 15px 25px;
            cursor: pointer;
            background: #f0f0f0;
            border: none;
            flex: 1;
            text-align: center;
            transition: all var(--transition-speed);
            font-weight: 600;
            color: var(--secondary-color);
        }
        
        .tab:hover {
            background: #e0e0e0;
        }
        
        .tab.active {
            background: var(--primary-color);
            color: white;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
            animation: fadeIn 0.5s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .filters {
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .filter-select {
            padding: 10px 15px;
            border-radius: 5px;
            border: 1px solid #ddd;
            background-color: white;
            font-size: 1rem;
            color: var(--dark-color);
            min-width: 200px;
            cursor: pointer;
        }
        
        .filter-select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(0, 123, 255, 0.25);
        }
        
        .confidence-indicator {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        .confidence-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        
        .confidence-high {
            background-color: var(--success-color);
        }
        
        .confidence-medium {
            background-color: var(--warning-color);
        }
        
        .confidence-low {
            background-color: var(--danger-color);
        }
        
        .loading-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
        }
        
        .loading-spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top: 4px solid var(--primary-color);
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .tooltip {
            position: relative;
            display: inline-block;
            cursor: pointer;
        }
        
        .tooltip .tooltiptext {
            visibility: hidden;
            width: 200px;
            background-color: #555;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 10px;
            position: absolute;
            z-index: 1;
            bottom: 125%;
            left: 50%;
            margin-left: -100px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .tooltip:hover .tooltiptext {
            visibility: visible;
            opacity: 1;
        }
        
        .probability-bar {
            height: 10px;
            border-radius: 5px;
            background-color: #e9ecef;
            margin-top: 5px;
            overflow: hidden;
        }
        
        .probability-fill {
            height: 100%;
            background-color: var(--primary-color);
        }
        
        .form-pill {
            display: inline-block;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            color: white;
            text-align: center;
            line-height: 25px;
            font-weight: bold;
            margin-right: 5px;
        }
        
        .form-W {
            background-color: var(--success-color);
        }
        
        .form-D {
            background-color: var(--warning-color);
        }
        
        .form-L {
            background-color: var(--danger-color);
        }
        
        .team-stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 20px 0;
        }
        
        .badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-right: 5px;
            margin-bottom: 5px;
            background-color: var(--light-color);
            color: var(--dark-color);
        }
        
        .search-bar {
            width: 100%;
            padding: 12px 20px;
            margin: 8px 0;
            box-sizing: border-box;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: 0.3s;
        }
        
        .search-bar:focus {
            border: 2px solid var(--primary-color);
            outline: none;
        }
        
        .section-title {
            margin: 30px 0 15px 0;
            color: var(--dark-color);
            border-left: 4px solid var(--primary-color);
            padding-left: 10px;
        }
        
        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }
        
        .btn-primary:hover {
            background-color: #0069d9;
        }
        
        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
        }
        
        .btn-outline:hover {
            background-color: var(--primary-color);
            color: white;
        }
        
        .input-group {
            display: flex;
            margin-bottom: 15px;
        }
        
        .input-group .search-bar {
            border-top-right-radius: 0;
            border-bottom-right-radius: 0;
            margin: 0;
        }
        
        .input-group .btn {
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
        }
        
        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }
        
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background-color: var(--primary-color);
        }
        
        input:focus + .slider {
            box-shadow: 0 0 1px var(--primary-color);
        }
        
        input:checked + .slider:before {
            transform: translateX(26px);
        }
        
        .dark-mode {
            background-color: #1a1a1a;
            color: #f0f0f0;
        }
        
        .dark-mode .stat-card,
        .dark-mode .chart-container,
        .dark-mode .match-header,
        .dark-mode table,
        .dark-mode .prediction-table {
            background-color: #2c2c2c;
            color: #f0f0f0;
        }
        
        .dark-mode th {
            background-color: #3c3c3c;
            color: #f0f0f0;
        }
        
        .dark-mode td {
            border-bottom: 1px solid #3c3c3c;
        }
        
        .dark-mode .tab {
            background-color: #3c3c3c;
            color: #f0f0f0;
        }
        
        .dark-mode .tab:hover {
            background-color: #4c4c4c;
        }
        
        .dark-mode .filter-select,
        .dark-mode .search-bar {
            background-color: #3c3c3c;
            color: #f0f0f0;
            border-color: #4c4c4c;
        }
        
        .dark-mode h2, 
        .dark-mode h3, 
        .dark-mode .section-title {
            color: #f0f0f0;
        }
        
        .dark-mode tr:hover {
            background-color: rgba(255,255,255,0.05);
        }
        
        /* Responsive design */
        @media (max-width: 768px) {
            .tabs {
                flex-direction: column;
            }
            
            .stat-card {
                padding: 15px;
            }
            
            .chart-container {
                padding: 15px;
                overflow-x: auto;
            }
            
            .match-header {
                flex-direction: column;
                text-align: center;
                gap: 10px;
            }
            
            .match-teams {
                justify-content: center;
            }
            
            .match-info {
                text-align: center;
            }
            
            th, td {
                padding: 10px;
                font-size: 0.9rem;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
            
            .prediction-table {
                overflow-x: auto;
            }
            
            .team-stats-grid {
                grid-template-columns: 1fr;
            }
            
            .filters {
                flex-direction: column;
            }
        }
    </style>
</head>

        // Ergebnisvorhersagen
        const scoresPredictions = [

            const [activeTab, setActiveTab] = React.useState('vorhersagen');
            const [darkMode, setDarkMode] = React.useState(false);
            const [selectedSource, setSelectedSource] = React.useState('Alle');
            const [selectedCategory, setSelectedCategory] = React.useState('Alle');
            const [isLoading, setIsLoading] = React.useState(false);
            const [searchQuery, setSearchQuery] = React.useState('');

            // Dummy-Funktion für das Laden der Daten
            const fetchData = () => {
                setIsLoading(true);
                setTimeout(() => {
                    setIsLoading(false);
                }, 1500);
            };

            // Beim ersten Laden Daten abrufen
            React.useEffect(() => {
                fetchData();
                
                // Dark Mode Listener
                if (darkMode) {
                    document.body.classList.add('dark-mode');
                } else {
                    document.body.classList.remove('dark-mode');
                }
            }, [darkMode]);

            // Gefilterte Prognosen basierend auf den Auswahlkriterien
            const filteredPredictions = predictions.filter(pred => {
                // Überprüfe Quelle
                if (selectedSource !== 'Alle' && pred.source !== selectedSource) return false;
                
                // Überprüfe Kategorie
                if (selectedCategory !== 'Alle' && pred.category !== selectedCategory) return false;
                
                // Überprüfe Suchfilter
                if (searchQuery && !(
                    pred.homeTeam.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    pred.awayTeam.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    pred.recommendation.toLowerCase().includes(searchQuery.toLowerCase())
                )) return false;
                
                return true;
            });

            // Berechnung der Durchschnittswerte
            const calcAverage = (property) => {
                if (filteredPredictions.length === 0) return 0;
                return filteredPredictions.reduce((sum, pred) => sum + pred[property], 0) / filteredPredictions.length;
            };

            const averageHomeWin = calcAverage('homeWinProbability');
            const averageDraw = calcAverage('drawProbability');
            const averageAwayWin = calcAverage('awayWinProbability');
            const averageExpectedGoals = calcAverage('expectedGoals');

            // Aggregierte Daten für Visualisierungen
            const aggregatedData = [

                                    <div style={{ textAlign: 'center', padding: '20px' }}>

                                    <p>
                                        <strong>Verletzungen:</strong>

                                            <span key={index} className="badge">{injury}</span>

                                </div>
                            </div>

                                                {odds.BTTS.toFixed(2)}
